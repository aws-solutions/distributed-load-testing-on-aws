# Security headers — keep in sync with CloudFront ResponseHeadersPolicy in
# source/infrastructure/lib/front-end/console-cloudfront.ts
#
# nginx drops ALL parent-level add_header directives when a location block
# defines its own add_header. This snippet must be included in every location
# block that sets Cache-Control or any other header.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Strict-Transport-Security "max-age=47304000; includeSubDomains" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self' https://*.amazonaws.com https://COGNITO_DOMAIN_PLACEHOLDER; upgrade-insecure-requests; script-src 'self' https://*.amazonaws.com https://COGNITO_DOMAIN_PLACEHOLDER; style-src 'self' 'unsafe-inline' https://*.amazonaws.com; img-src 'self' data: https://*.amazonaws.com; font-src 'self' data:; connect-src 'self' https://*.amazonaws.com https://COGNITO_DOMAIN_PLACEHOLDER wss://*.amazonaws.com https://metrics.awssolutionsbuilder.com; frame-src 'self' https://*.amazonaws.com; frame-ancestors 'self' https://*.amazonaws.com; object-src 'none'; base-uri 'self'; form-action 'self' https://*.amazonaws.com https://COGNITO_DOMAIN_PLACEHOLDER;" always;
